name: atomic-windows

# Firing tests: install the rustinel engine on a real Windows runner,
# perform an atomic action for each rule, and check the rule produced an alert.
# Installs published engine releases (>= v1.1.0) via the official install scripts.
on:
  workflow_dispatch:
    inputs:
      filter:
        description: "Only run tests whose name/id contains this substring"
        required: false
        default: ""
      pack:
        description: "Pack id to load (or 'auto')"
        required: false
        default: "auto"
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "0 6 * * *"        # nightly 06:00 UTC

permissions:
  contents: read

jobs:
  atomic:
    runs-on: windows-latest
    name: windows
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Build rules pack
        run: |
          uv sync --frozen
          uv run python tools/validate.py
          uv run python tools/build_packs.py
        shell: bash

      - name: Check atomic coverage metadata
        run: python tests/atomic/run_atomics.py --check-coverage --strict-essential
        shell: bash

      - name: Install rustinel engine (Windows)
        run: |
          Invoke-WebRequest https://raw.githubusercontent.com/Karib0u/rustinel/main/scripts/install/install.ps1 -OutFile install.ps1
          powershell -ExecutionPolicy Bypass -File .\install.ps1 -InstallDir "$env:GITHUB_WORKSPACE\tests\atomic\.engine"
        shell: pwsh

      - name: Exclude workspace from Defender (Windows, for EICAR)
        run: Add-MpPreference -ExclusionPath "$env:GITHUB_WORKSPACE" -ErrorAction SilentlyContinue
        shell: pwsh

      - name: Run atomic tests (Windows)
        run: |
          python tests\atomic\run_atomics.py `
            --platform windows `
            --engine-dir "$env:GITHUB_WORKSPACE\tests\atomic\.engine" `
            --pack "${{ github.event.inputs.pack || 'auto' }}" `
            --filter "${{ github.event.inputs.filter }}"
        shell: pwsh

      - name: Upload report + engine logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: atomic-report-windows
          path: |
            tests/atomic/report-*.json
            tests/atomic/.engine/logs/
          include-hidden-files: true   # .engine/ is a dotdir, skipped otherwise
          if-no-files-found: warn
